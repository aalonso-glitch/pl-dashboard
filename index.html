<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>P&L Dashboard | LA TRIBU</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#253349;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--teal:#14b8a6;--purple:#a78bfa;--accent:#22d3ee;font-family:system-ui,-apple-system,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:700;color:var(--accent)}
.logo span{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
.filters{display:flex;gap:8px;align-items:center}
.btn-mes{padding:6px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer;font-size:13px;transition:all .15s}
.btn-mes.active{background:var(--accent);border-color:var(--accent);color:#0f172a;font-weight:600}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;gap:0;overflow-x:auto}
.tab{padding:12px 18px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
.main{padding:20px;max-width:1600px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.kpi-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-val{font-size:22px;font-weight:700}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-green .kpi-val{color:var(--green)}
.kpi-red .kpi-val{color:var(--red)}
.kpi-blue .kpi-val{color:var(--blue)}
.kpi-amber .kpi-val{color:var(--amber)}
.kpi-teal .kpi-val{color:var(--teal)}
.section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.chart-wrap{position:relative;width:100%}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border);font-weight:500;font-size:11px;text-transform:uppercase;cursor:pointer;white-space:nowrap}
th:hover{color:var(--text)}
td{padding:7px 10px;border-bottom:1px solid var(--surface2)}
tr:hover td{background:var(--surface2)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600}
.badge-green{background:rgba(16,185,129,.15);color:#34d399}
.badge-red{background:rgba(239,68,68,.15);color:#f87171}
.badge-amber{background:rgba(245,158,11,.15);color:#fcd34d}
.badge-blue{background:rgba(59,130,246,.15);color:#93c5fd}
.code{font-family:monospace;font-size:11px;color:var(--muted)}
.tag{font-size:10px;background:var(--surface2);padding:2px 6px;border-radius:3px;color:var(--muted)}
.pbar-wrap{background:var(--surface2);border-radius:3px;height:6px;min-width:60px}
.pbar{height:6px;border-radius:3px}
.alert-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#fca5a5}
.tbl-container{overflow-x:auto;max-height:480px;overflow-y:auto}
.tbl-container::-webkit-scrollbar{width:5px;height:5px}
.tbl-container::-webkit-scrollbar-track{background:var(--surface)}
.tbl-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.panel{display:none}
.panel.active{display:block}
.note{font-size:11px;color:var(--muted);background:rgba(34,211,238,.05);border:1px solid rgba(34,211,238,.15);border-radius:6px;padding:10px 14px;margin-bottom:14px}
</style>
</head>
<body>
<header>
  <div class="logo">LA TRIBU <span>| P&L Dashboard 2026</span></div>
  <div class="filters">
    <span style="font-size:11px;color:var(--muted);margin-right:4px">MES:</span>

  </div>
</header>
<div class="tabs">
  <div class="tab active" onclick="setTab('scorecard')">⭐ Scorecard</div>
  <div class="tab" onclick="setTab('plmensual')">P&L Mensual</div>
  <div class="tab" onclick="setTab('resumen')">Resumen P&L</div>
  <div class="tab" onclick="setTab('proyectos')">Por Proyecto</div>
  <div class="tab" onclick="setTab('clientes')">Por Cliente</div>
  <div class="tab" onclick="setTab('overhead')">Overhead</div>
  <div class="tab" onclick="setTab('horas')">Horas vs Budget (Operación)</div>
</div>
<div class="main">
<div id="kpis" class="kpi-grid"></div>
<div id="panel-scorecard" class="panel active"></div>
<div id="panel-plmensual" class="panel"></div>
<div id="panel-resumen" class="panel"></div>
<div id="panel-proyectos" class="panel"></div>
<div id="panel-clientes" class="panel"></div>
<div id="panel-overhead" class="panel"></div>
<div id="panel-horas" class="panel"></div>
</div>

function setTab(t){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.onclick.toString().includes("'"+t+"'")));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  render();
}

function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function mkChart(id,cfg){
  destroyChart(id);
  const el=document.getElementById(id);
  if(!el)return;
  charts[id]=new Chart(el,cfg);
}

function renderKPIs(){
  const d=getData();
  const ing=sum(d,'ingreso'),cost=sum(d,'costo_nomina_real'),oh=sum(d,'oh_real'),mar=sum(d,'margen_real');
  const marPct=ing>0?mar/ing*100:0;
  const proy=new Set(d.map(r=>r.codigo)).size;
  const sfx=currentMes==='TODOS'?' (Q1)':'';
  document.getElementById('kpis').innerHTML=`
  <div class="kpi kpi-blue"><div class="kpi-label">Ingresos Facturados${sfx}</div><div class="kpi-val">${fmtM(ing)}</div><div class="kpi-sub">Presupuesto total: ${fmtM(TOTAL_VENTA)}</div></div>

function renderPlMensual(){
  const meses=['ENE','FEB','MZO'];
  const mesesLabel=['Enero','Febrero','Marzo'];

  // Datos acumulados mes a mes
  let acumIng=0,acumGastos=0;
  const dataAcum=meses.map(m=>{
    const d=PL.filter(r=>r.mes===m);
    const ing=sum(d,'ingreso');
    const gastos=sum(d,'costo_nomina_real')+sum(d,'oh_real');
    acumIng+=ing;acumGastos+=gastos;
    return {mes:m,ing,gastos,mar:ing-gastos,acumIng,acumGastos,acumMar:acumIng-acumGastos};
  });

  // Remanente por proyecto (presupuesto - ingresos ya cobrados)
  const byProy={};
  PL.forEach(r=>{
    if(!byProy[r.codigo])byProy[r.codigo]={proyecto:r.proyecto,cliente:r.cliente,venta:r.venta,cobrado:0};
    byProy[r.codigo].cobrado+=r.ingreso;
  });
  const proyRem=Object.values(byProy).map(p=>({...p,remanente:p.venta-p.cobrado,pctCobrado:p.venta>0?p.cobrado/p.venta*100:0})).sort((a,b)=>b.venta-a.venta);

  let html=`<div class="grid2">
  <div class="section">
    <div class="section-title">Ingresos vs Gastos — Mensual y Acumulado Q1</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:11px">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#3b82f6;border-radius:2px"></span>Ingresos</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#ef4444;border-radius:2px"></span>Gastos</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#10b981;border-radius:2px"></span>Margen</span>
    </div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch-plm-bar"></canvas></div>
  </div>
  <div class="section">
    <div class="section-title">Acumulado Q1 — Ingresos vs Gastos</div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch-plm-acum"></canvas></div>
  </div></div>

  <div class="section">
    <div class="section-title">Semáforo mensual — ¿El ingreso cubre los gastos?</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0">`;

  dataAcum.forEach(d=>{
    const cubre=d.ing>=d.gastos;
    const pct=d.gastos>0?d.ing/d.gastos*100:0;
    const color=cubre?'var(--green)':pct>=70?'var(--amber)':'var(--red)';
    const icon=cubre?'✅':'⚠';
    html+=`<div style="background:var(--surface2);border-radius:8px;padding:14px;border-left:3px solid ${color}">
      <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">${d.mes} 2026 ${icon}</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:11px;color:var(--muted)">Ingresos</span>
        <span style="font-size:12px;color:var(--blue);font-weight:600">Q${fmt(d.ing)}</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;color:var(--muted)">Gastos</span>
        <span style="font-size:12px;color:var(--red);font-weight:600">Q${fmt(d.gastos)}</span>
      </div>
      <div style="background:var(--surface);border-radius:4px;height:6px;margin-bottom:6px">
        <div style="height:6px;border-radius:4px;background:${color};width:${Math.min(100,pct).toFixed(0)}%"></div>
      </div>
      <div style="font-size:11px;color:${color};font-weight:600">${cubre?'Cubre gastos ✓':'Déficit: Q'+fmt(d.gastos-d.ing)}</div>
    </div>`;
  });
  html+=`</div></div>

  <div class="section">
    <div class="section-title">Remanente por cobrar — Presupuesto vs Cobrado (Q1)</div>
    <div class="note" style="margin-bottom:12px">💰 Remanente = lo que aún falta por facturar de cada proyecto. Un remanente alto con gastos corriendo = urgencia de cobro.</div>
    <div class="tbl-container"><table><thead><tr>
      <th>Proyecto</th><th>Cliente</th><th>Presupuesto</th><th>Cobrado Q1</th><th>Remanente</th><th>% Avance</th><th>Estado</th>
    </tr></thead><tbody>`;

  proyRem.forEach(p=>{
    const pct=p.pctCobrado;
    const estado=p.remanente<=0?'<span class="badge badge-green">Cobrado</span>':pct>=50?'<span class="badge badge-amber">En curso</span>':'<span class="badge badge-red">Pendiente</span>';
    const barColor=pct>=75?'var(--green)':pct>=40?'var(--amber)':'var(--red)';
    html+=`<tr>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.proyecto}</td>
      <td><span class="tag">${p.cliente}</span></td>
      <td style="color:var(--muted)">Q${fmt(p.venta)}</td>
      <td style="color:var(--blue);font-weight:500">Q${fmt(p.cobrado)}</td>
      <td style="color:${p.remanente>0?'var(--amber)':'var(--green)'};font-weight:600">Q${fmt(Math.max(0,p.remanente))}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:60px;height:5px;background:var(--surface2);border-radius:3px">
            <div style="width:${Math.min(100,pct).toFixed(0)}%;height:5px;background:${barColor};border-radius:3px"></div>
          </div>
          <span style="font-size:11px;color:var(--muted)">${pct.toFixed(0)}%</span>
        </div>
      </td>
      <td>${estado}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('panel-plmensual').innerHTML=html;

  mkChart('ch-plm-bar',{type:'bar',data:{labels:mesesLabel,datasets:[
    {label:'Ingresos',data:dataAcum.map(d=>d.ing),backgroundColor:'rgba(59,130,246,.7)',borderRadius:4},
    {label:'Gastos',data:dataAcum.map(d=>d.gastos),backgroundColor:'rgba(239,68,68,.7)',borderRadius:4},
    {label:'Margen',data:dataAcum.map(d=>d.mar),backgroundColor:dataAcum.map(d=>d.mar>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.4)'),borderRadius:4,type:'bar'}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#94a3b8',callback:v=>fmtM(v)},grid:{color:'rgba(255,255,255,.05)'}}}}});

  mkChart('ch-plm-acum',{type:'line',data:{labels:mesesLabel,datasets:[
    {label:'Ingresos acum.',data:dataAcum.map(d=>d.acumIng),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.1)',fill:true,tension:.3,pointRadius:4},
    {label:'Gastos acum.',data:dataAcum.map(d=>d.acumGastos),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.1)',fill:true,tension:.3,pointRadius:4},
    {label:'Margen acum.',data:dataAcum.map(d=>d.acumMar),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.05)',fill:false,tension:.3,pointRadius:4,borderDash:[4,4]}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#94a3b8',callback:v=>fmtM(v)},grid:{color:'rgba(255,255,255,.05)'}}}}});
}

  const sorted=[...d].sort((a,b)=>sortD*(a[sortK]||0)>(sortD*(b[sortK]||0))?-1:1);
  let html=`<div class="note">💡 Proyectos con <strong>ingreso cero</strong> generan pérdida pura por overhead + nómina. Se recomienda validar fecha de facturación o activar cobro.</div>
  <div class="section"><div class="section-title">Detalle P&L por Proyecto — ${currentMes==='TODOS'?'Q1 2026':currentMes+' 2026'}</div>
  <div class="tbl-container"><table><thead><tr>
    <th onclick="sortBy('codigo')">CeCo / Código</th>
    <th onclick="sortBy('proyecto')">Proyecto</th>
    <th onclick="sortBy('cliente')">Cliente</th>
    <th onclick="sortBy('venta')">Presupuesto</th>
    <th onclick="sortBy('ingreso')">Ingreso Real</th>
    <th onclick="sortBy('costo_nomina_real')">Costo Nómina</th>
    <th onclick="sortBy('oh_real')">Overhead</th>
    <th onclick="sortBy('margen_real')">Margen</th>
    <th onclick="sortBy('margen_pct')">Margen %</th>
    <th onclick="sortBy('personas')">Personas</th>
  </tr></thead><tbody>`;
  sorted.forEach(r=>{
    const semaforo=r.ingreso===0?'🔴':r.margen_real<0?'🔴':r.margen_pct>=70?'🟢':r.margen_pct>=40?'🟡':'🟠';
    html+=`<tr>
      <td><span class="code">${r.codigo}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.proyecto}">${semaforo} ${r.proyecto}</td>
      <td><span class="tag">${r.cliente}</span></td>
      <td style="color:var(--muted)">Q${fmt(r.venta)}</td>
      <td style="color:${r.ingreso>0?'var(--blue)':'var(--red)'};font-weight:500">Q${fmt(r.ingreso)}</td>
      <td style="color:var(--amber)">Q${fmt(r.costo_nomina_real)}</td>
      <td style="color:var(--purple)">Q${fmt(r.oh_real)}</td>
      <td style="color:${r.margen_real>=0?'var(--green)':'var(--red)'};font-weight:600">Q${fmt(r.margen_real)}</td>
      <td>${badge(r.margen_pct)}</td>
      <td style="text-align:center">${r.personas}</td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('panel-proyectos').innerHTML=html;
}

function sortBy(k){sortK=k;sortD*=-1;renderProyectos();}

function renderClientes(){
  const d=getData();
  const byCliente={};
  d.forEach(r=>{
    if(!byCliente[r.cliente])byCliente[r.cliente]={cliente:r.cliente,ingresos:0,costo_nomina:0,oh:0,margen:0,proyectos:new Set()};
    byCliente[r.cliente].ingresos+=r.ingreso;
    byCliente[r.cliente].costo_nomina+=r.costo_nomina_real;
    byCliente[r.cliente].oh+=r.oh_real;
    byCliente[r.cliente].margen+=r.margen_real;
    byCliente[r.cliente].proyectos.add(r.proyecto);
  });
  const clientes=Object.values(byCliente).sort((a,b)=>b.margen-a.margen);
  const top10=clientes.slice(0,10);
  let html=`<div class="grid2">
  <div class="section"><div class="section-title">Top 10 Clientes — Margen (${currentMes==='TODOS'?'Q1':currentMes})</div>
    <div class="chart-wrap" style="height:${top10.length*38+60}px"><canvas id="ch-clientes"></canvas></div>
  </div>
  <div class="section"><div class="section-title">Rentabilidad por Cliente</div>
  <div class="tbl-container"><table><thead><tr><th>Cliente</th><th>Ingresos</th><th>Nómina</th><th>Overhead</th><th>Margen</th><th>Margen %</th><th>Proyectos</th></tr></thead><tbody>`;
  clientes.forEach(c=>{
    const pct=c.ingresos>0?c.margen/c.ingresos*100:null;
    html+=`<tr><td style="font-weight:500">${c.cliente}</td><td style="color:var(--blue)">Q${fmt(c.ingresos)}</td><td style="color:var(--amber)">Q${fmt(c.costo_nomina)}</td><td style="color:var(--purple)">Q${fmt(c.oh)}</td><td style="color:${c.margen>=0?'var(--green)':'var(--red)'};font-weight:600">Q${fmt(c.margen)}</td><td>${badge(pct)}</td><td style="text-align:center">${c.proyectos.size}</td></tr>`;
  });
  html+=`</tbody></table></div></div></div>`;
  document.getElementById('panel-clientes').innerHTML=html;
  mkChart('ch-clientes',{type:'bar',data:{labels:top10.map(c=>c.cliente),datasets:[{data:top10.map(c=>c.margen),backgroundColor:top10.map(c=>c.margen>=0?'rgba(16,185,129,.7)':'rgba(239,68,68,.7)'),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8',callback:v=>fmtM(v)},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{display:false}}}}});
}

function renderOverhead(){
  const cats=Object.keys(OH_CATS);
  const meses=['ENE','FEB','MZO'];
  let html=`<div class="note">📌 El Overhead se distribuye a cada proyecto según su <strong>% de participación en Venta total</strong>. Si entran nuevos proyectos, el % se redistribuye y cada proyecto existente absorbe <em>menos</em> carga administrativa.</div>
  <div class="grid2">
  <div class="section"><div class="section-title">Overhead Real vs Presupuesto — Mensual</div>
    <div style="display:flex;gap:12px;margin-bottom:12px;font-size:11px">
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:#ef4444;border-radius:2px"></span>Real</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:rgba(239,68,68,.3);border-radius:2px"></span>Presupuesto mensual</span>
    </div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch-oh-line"></canvas></div>
  </div>
  <div class="section"><div class="section-title">Composición Overhead — ${currentMes==='TODOS'?'Promedio Q1':currentMes}</div>
    <div class="chart-wrap" style="height:240px"><canvas id="ch-oh-pie"></canvas></div>
  </div></div>
  <div class="section"><div class="section-title">Detalle Overhead Real por Categoría</div>
  <table><thead><tr><th>Categoría</th><th>ENE 2026</th><th>FEB 2026</th><th>MZO 2026</th><th>Total Q1</th><th>Participación</th></tr></thead><tbody>`;
  const totalQ1=Object.values(OH_CATS).reduce((a,v)=>a+v.ENE+v.FEB+v.MZO,0);
  cats.forEach(cat=>{
    const v=OH_CATS[cat];const tot=v.ENE+v.FEB+v.MZO;const pct=tot/totalQ1*100;
    html+=`<tr><td style="font-weight:500">${cat}</td><td>Q${fmt(v.ENE)}</td><td>Q${fmt(v.FEB)}</td><td>Q${fmt(v.MZO)}</td><td style="font-weight:600">Q${fmt(tot)}</td><td>${pbar(pct,50,'#a78bfa')} ${pct.toFixed(1)}%</td></tr>`;
  });
  const tot={ENE:OH_REAL.ENE,FEB:OH_REAL.FEB,MZO:OH_REAL.MZO};
  html+=`<tr style="font-weight:600;border-top:1px solid var(--border)"><td>TOTAL OVERHEAD</td><td style="color:var(--red)">Q${fmt(tot.ENE)}</td><td style="color:var(--red)">Q${fmt(tot.FEB)}</td><td style="color:var(--red)">Q${fmt(tot.MZO)}</td><td style="color:var(--red)">Q${fmt(tot.ENE+tot.FEB+tot.MZO)}</td><td>100%</td></tr>`;
  html+=`</tbody></table></div>`;
  document.getElementById('panel-overhead').innerHTML=html;
  mkChart('ch-oh-line',{type:'bar',data:{labels:['Enero','Febrero','Marzo'],datasets:[
    {label:'Real',data:[OH_REAL.ENE,OH_REAL.FEB,OH_REAL.MZO],backgroundColor:'rgba(239,68,68,.7)',borderRadius:4},
    {label:'Presupuesto',data:[OH_PPTO,OH_PPTO,OH_PPTO],type:'line',borderColor:'rgba(239,68,68,.4)',backgroundColor:'transparent',pointBackgroundColor:'rgba(239,68,68,.4)',borderDash:[4,4]}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#94a3b8',callback:v=>fmtM(v)},grid:{color:'rgba(255,255,255,.05)'}}}}});
  const selMes=currentMes==='TODOS'?'ENE':currentMes;
  mkChart('ch-oh-pie',{type:'doughnut',data:{labels:cats,datasets:[{data:cats.map(c=>OH_CATS[c][selMes]),backgroundColor:['rgba(59,130,246,.8)','rgba(16,185,129,.8)','rgba(245,158,11,.8)','rgba(239,68,68,.8)','rgba(167,139,250,.8)','rgba(20,184,166,.8)','rgba(249,115,22,.8)'],borderColor:'#1e293b',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',boxWidth:10,font:{size:10}}}}}});
}

function renderHoras(){
  const d=getData();
  const sorted=[...d].sort((a,b)=>b.hrs_reales-a.hrs_reales).slice(0,15);
  let html=`<div class="note">📊 Las <strong>Horas Estimadas</strong> representan el presupuesto de tiempo. Las <strong>Horas Reales</strong> impactan directamente el costo de nómina. Desviaciones &gt;20% requieren análisis.</div>
  <div class="section"><div class="section-title">Top 15 Proyectos por Horas Reales — ${currentMes==='TODOS'?'Q1':currentMes}</div>
    <div class="chart-wrap" style="height:${sorted.length*38+60}px"><canvas id="ch-horas"></canvas></div>
  </div>
  <div class="section"><div class="section-title">Detalle Horas por Proyecto</div>
  <div class="tbl-container"><table><thead><tr><th>CeCo</th><th>Proyecto</th><th>Hrs Estimadas</th><th>Hrs Reales</th><th>Desviación</th><th>Estado</th><th>Personas</th></tr></thead><tbody>`;
  d.forEach(r=>{
    const dev=r.hrs_estimadas>0?(r.hrs_reales-r.hrs_estimadas)/r.hrs_estimadas*100:0;
    const estado=Math.abs(dev)<10?'<span class="badge badge-green">OK</span>':dev>10?'<span class="badge badge-red">Sobreeje.</span>':'<span class="badge badge-amber">Bajo</span>';
    html+=`<tr><td class="code">${r.codigo}</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.proyecto}</td><td>${r.hrs_estimadas.toFixed(0)}h</td><td style="font-weight:500">${r.hrs_reales.toFixed(0)}h</td><td style="color:${dev>15?'var(--red)':dev<-15?'var(--amber)':'var(--green)'}">${dev>0?'+':''}${dev.toFixed(1)}%</td><td>${estado}</td><td style="text-align:center">${r.personas}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById('panel-horas').innerHTML=html;
  mkChart('ch-horas',{type:'bar',data:{labels:sorted.map(r=>r.proyecto.substring(0,22)),datasets:[
    {label:'Estimadas',data:sorted.map(r=>r.hrs_estimadas),backgroundColor:'rgba(59,130,246,.5)',borderRadius:3},
    {label:'Reales',data:sorted.map(r=>r.hrs_reales),backgroundColor:sorted.map(r=>r.hrs_reales>r.hrs_estimadas?'rgba(239,68,68,.7)':'rgba(16,185,129,.7)'),borderRadius:3}
  ]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8'},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#94a3b8',font:{size:10}},grid:{display:false}}}}});
}

function render(){
  renderKPIs();
  if(currentTab==='scorecard')renderScorecard();
  else if(currentTab==='plmensual')renderPlMensual();
  else if(currentTab==='resumen')renderResumen();
  else if(currentTab==='proyectos')renderProyectos();
  else if(currentTab==='clientes')renderClientes();
  else if(currentTab==='overhead')renderOverhead();
  else if(currentTab==='horas')renderHoras();
}

render();
</script>
</body>
</html>
